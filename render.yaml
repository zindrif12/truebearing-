# Render Blueprint — one-click deploy
# On render.com: New + → Blueprint → pick this repo → paste your key → Apply
# FREE:  get a GEMINI_API_KEY at https://aistudio.google.com/apikey (no card)
# PAID:  use ANTHROPIC_API_KEY from https://console.anthropic.com instead
#        (add it manually in the Render dashboard under Environment)
services:
  - type: web
    name: truebearing
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # you will be prompted to paste your key securely
